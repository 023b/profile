<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Falling Cherry Blossoms</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000000;
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: Arial, sans-serif;
            color: #00ff00;
        }

        canvas {
            display: block;
            background: #000000;
        }

        .info {
            position: absolute;
            bottom: 20px;
            left: 20px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            color: #00ff00;
            opacity: 0.6;
        }
    </style>
</head>
<body>
    <canvas id="blossomCanvas"></canvas>
    <div class="info">cherry blossoms falling...</div>

    <script>
        const canvas = document.getElementById('blossomCanvas');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const fallingBlossoms = [];
        const settledBlossoms = [];
        
        let windActive = false;
        let windDirection = 1; // 1 = right, -1 = left
        let windStartTime = 0;
        let windDuration = 12000; // gust length
        let calmDuration = 15000; // straight fall between gusts
        let totalTime = 0;
        let lastTime = 0;
        let lastWindEndTime = 0; // track when last gust ended
        let windStrength = 0;
        const MAX_WIND_STRENGTH = 2.5;

        let mouseX = null;
        let mouseY = null;
        const MOUSE_INFLUENCE_RADIUS = 40;

        class Blossom {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = -20;
                this.vx = (Math.random() - 0.5) * 0.4;
                this.vy = Math.random() * 0.8 + 0.6;
                this.wobbleAmount = Math.random() * 1 + 0.5;
                this.wobbleSpeed = Math.random() * 0.002 + 0.001;
                this.wobbleOffset = Math.random() * Math.PI * 2;
                this.opacity = 0.35; // a bit more transparent
                this.settled = false;
                this.settleTime = 0;
                this.rotation = 0;
                this.angularVelocity = (Math.random() - 0.5) * 0.01;
                this.windCaught = false;
            }

            generatePetals() {
                const petals = [];
                for (let i = 0; i < 5; i++) {
                    const angle = (i / 5) * Math.PI * 2;
                    const distance = 3;
                    petals.push({
                        x: Math.cos(angle) * distance,
                        y: Math.sin(angle) * distance
                    });
                }
                return petals;
            }

            update(time, windForceX, deltaTime) {
                if (!this.settled) {
                    // Gravity (slower fall)
                    const gravity = 0.02;
                    this.vy += gravity * deltaTime;
                    this.vy = Math.min(this.vy, 1.4);

                    // Horizontal wind + drag
                    this.vx += windForceX * 0.04 * deltaTime;
                    this.vx *= 0.995;

                    // Mouse repulsion (very local and gentle)
                    if (mouseX !== null && mouseY !== null) {
                        const dx = this.x - mouseX;
                        const dy = this.y - mouseY;
                        const distSq = dx * dx + dy * dy;
                        const radiusSq = MOUSE_INFLUENCE_RADIUS * MOUSE_INFLUENCE_RADIUS;
                        if (distSq < radiusSq && distSq > 4) {
                            const dist = Math.sqrt(distSq);
                            const force = (1 - dist / MOUSE_INFLUENCE_RADIUS) * 0.12;
                            const nx = dx / dist;
                            const ny = dy / dist;
                            this.vx += nx * force * deltaTime;
                            this.vy += ny * force * deltaTime;
                        }
                    }

                    // Flutter / wobble
                    const wobble = Math.sin(time * this.wobbleSpeed + this.wobbleOffset) * this.wobbleAmount * 0.06;

                    this.x += (this.vx + wobble) * deltaTime;
                    this.y += this.vy * deltaTime;

                    // Airborne spin
                    this.angularVelocity += (windForceX * 0.001 - this.angularVelocity * 0.02) * deltaTime;
                    this.rotation += this.angularVelocity * deltaTime;

                    // Hit the ground
                    const groundY = canvas.height - 5;
                    if (this.y >= groundY) {
                        this.y = groundY;
                        this.settled = true;
                        this.settleTime = time;
                        this.vx = 0;
                        this.vy = 0;
                        this.angularVelocity = 0;
                        this.rotation = 0;
                    }
                } else {
                    // Settled on the ground: small chance to be picked up by a gust
                    const gust = Math.abs(windForceX);
                    if (gust > 0.3 && Math.random() < 0.02 * gust) {
                        this.settled = false;
                        this.windCaught = true;
                        this.vy = -(0.3 + Math.random() * 0.4);
                        this.vx = windForceX * (0.5 + Math.random());
                        this.angularVelocity = (Math.random() - 0.5) * 0.05;
                    }

                    // No extra mouse shove on the ground to keep it calm
                }
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.opacity;
                ctx.fillStyle = '#ffb3d9';

                const drawY = this.y;

                if (!this.settled) {
                    ctx.translate(this.x, drawY);
                    ctx.rotate(this.rotation);
                    ctx.translate(-this.x, -drawY);
                }

                // Draw center (thicker)
                ctx.fillRect(this.x - 1.5, drawY - 1.5, 3, 3);

                // Draw 5 petals (thicker)
                const petals = this.generatePetals();
                petals.forEach(petal => {
                    ctx.fillRect(this.x + petal.x - 1.5, drawY + petal.y - 1.5, 3, 3);
                });

                ctx.restore();
            }

            isOffScreen() {
                return (
                    this.x > canvas.width + 100 ||
                    this.x < -100 ||
                    this.y > canvas.height + 100 ||
                    this.y < -100
                );
            }
        }

        function animate(time) {
            if (!lastTime) {
                lastTime = time; // avoid first-frame stutter
            }
            const deltaTime = Math.min((time - lastTime) / 16.67, 2);
            lastTime = time;
            totalTime = time;
            
            // Compute wind envelope (smooth fade in/out)
            if (windActive) {
                const t = (time - windStartTime) / windDuration;
                if (t >= 1) {
                    windActive = false;
                    windStrength = 0;
                    lastWindEndTime = time;
                    windDirection *= -1; // next gust opposite direction
                } else {
                    const envelope = Math.sin(t * Math.PI); // 0 → 1 → 0
                    windStrength = envelope * MAX_WIND_STRENGTH;
                }
            } else {
                // Start a new gust after calmDuration has passed
                if (time - lastWindEndTime >= calmDuration) {
                    windActive = true;
                    windStartTime = time;
                }
                windStrength *= 0.95;
                if (windStrength < 0.01) windStrength = 0;
            }

            const windForceX = windStrength * windDirection;

            ctx.fillStyle = '#000000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Spawn new blossoms continuously
            if (Math.random() > 0.9) {
                fallingBlossoms.push(new Blossom());
            }

            // Update and draw falling blossoms
            for (let i = fallingBlossoms.length - 1; i >= 0; i--) {
                fallingBlossoms[i].update(time, windForceX, deltaTime);
                fallingBlossoms[i].draw();

                if (fallingBlossoms[i].settled) {
                    settledBlossoms.push(fallingBlossoms.splice(i, 1)[0]);
                }
            }

            // Update and draw settled blossoms
            for (let i = settledBlossoms.length - 1; i >= 0; i--) {
                settledBlossoms[i].update(time, windForceX, deltaTime);
                settledBlossoms[i].draw();

                if (settledBlossoms[i].isOffScreen()) {
                    settledBlossoms.splice(i, 1);
                }
            }

            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        canvas.addEventListener('pointermove', (e) => {
            const rect = canvas.getBoundingClientRect();
            mouseX = e.clientX - rect.left;
            mouseY = e.clientY - rect.top;
        });

        canvas.addEventListener('pointerleave', () => {
            mouseX = null;
            mouseY = null;
        });

        animate(0);
    </script>
</body>
</html>
